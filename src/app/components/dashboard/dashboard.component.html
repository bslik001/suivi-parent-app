<div class="dashboard-container">
  <header class="dashboard-header">
    <div class="header-top">
      <h1>Mes Enfants</h1>
      <button (click)="logout()" class="btn-logout">Déconnexion</button>
    </div>
    <p>Sélectionnez un enfant pour consulter ses résultats académiques.</p>
  </header>

  <div *ngIf="loading" class="loader">Chargement...</div>

  <div class="student-grid" *ngIf="!loading">
    <div class="student-card" *ngFor="let enfant of enfants">
      <div class="card-header">
        <div class="avatar">{{ enfant.prenom.charAt(0) }}{{ enfant.nom.charAt(0) }}</div>
        <h3>{{ enfant.prenom }} {{ enfant.nom }}</h3>
        <span class="matricule">{{ enfant.matricule }}</span>
      </div>
      
      <div class="card-body">
        <p><strong>Classe :</strong> {{ enfant.classe.libelle }}</p>
        <p><strong>Filière :</strong> {{ enfant.classe.filiere }}</p>
      </div>

      <div class="card-actions">
        <button (click)="voirNotes(enfant.matricule)" class="btn-notes">
          <i class="icon-file"></i> Notes
        </button>
        <button (click)="telechargerPlanning(enfant.classe.id)" class="btn-planning">
          <i class="icon-calendar"></i> Emploi du temps
        </button>
      </div>
    </div>
  </div>
</div>
