<div class="login-container">
  <div class="login-card">
    <img src="assets/logo-saint-jean.png" alt="Logo" class="logo">
    <h2>Suivi Académique Parents</h2>
    <p class="subtitle">Authentification sécurisée par SMS</p>

    <div *ngIf="step === 1">
      <div class="form-group">
        <label>Numéro de téléphone</label>
        <input type="text" [(ngModel)]="phone" placeholder="+237 6xx xxx xxx" class="form-control">
      </div>
      <button (click)="onSendOtp()" [disabled]="!phone" class="btn-primary">
        Recevoir le code
      </button>
    </div>

    <div *ngIf="step === 2">
      <div class="alert-info">
        Un code a été envoyé au {{ phone }}.<br>
        Expire dans : <strong>{{ formatTime(timeLeft) }}</strong>
      </div>
      <div class="form-group">
        <label>Code de validation</label>
        <input type="text" [(ngModel)]="otp" maxlength="6" class="form-control otp-input">
      </div>
      <button (click)="onVerifyOtp()" class="btn-primary">Valider</button>
      <button (click)="step = 1; stopTimer()" class="btn-link">Changer de numéro</button>
    </div>

    <p class="error" *ngIf="errorMessage">{{ errorMessage }}</p>
  </div>
</div>
